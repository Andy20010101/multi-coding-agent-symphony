name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_real_codex:
        description: Run the gated real Codex Harness smoke
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm test:mutation:gate
      - run: git diff --check
      - run: pnpm mcas doctor

      - name: Optional real CLI preflight
        if: ${{ vars.MCAS_RUN_REAL_CODEX == '1' || inputs.run_real_codex == 'true' }}
        env:
          MCAS_RUN_REAL_CODEX: "1"
        run: pnpm mcas doctor --real-cli --adapter codex --require-gates --proof-dir tmp/real-cli-proofs

      - name: Optional real Codex Harness smoke
        if: ${{ vars.MCAS_RUN_REAL_CODEX == '1' || inputs.run_real_codex == 'true' }}
        env:
          MCAS_RUN_REAL_CODEX: "1"
          MCAS_REAL_CLI_PROOF_DIR: tmp/real-cli-proofs
        run: pnpm smoke:harness:codex:real
